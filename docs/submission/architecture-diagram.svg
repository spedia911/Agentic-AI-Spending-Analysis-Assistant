<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100" role="img" aria-labelledby="title desc">
  <title id="title">Technical architecture for the Agentic AI Spending Analysis Assistant</title>
  <desc id="desc">Google Drive screenshots flow through ingestion, extraction, normalization, validation, categorization, review, Google Sheets, summary, anomaly, and dashboard guidance modules.</desc>
  <rect width="1800" height="1100" fill="#f6f7f9"/>
  <text x="90" y="90" fill="#18202a" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700">Technical Architecture</text>
  <text x="92" y="134" fill="#667085" font-family="Arial, Helvetica, sans-serif" font-size="24">Drive-first screenshot ingestion, modular agent workflow, durable Sheets memory, and human review loops</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475467"/>
    </marker>
  </defs>

  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="80" y="210" width="280" height="130" rx="18" fill="#eef2f6" stroke="#cbd5e1" stroke-width="3"/>
    <text x="112" y="260" fill="#18202a" font-size="26" font-weight="700">Source</text>
    <text x="112" y="298" fill="#344054" font-size="20">Google Drive folder</text>
    <text x="112" y="326" fill="#344054" font-size="20">financial screenshots</text>

    <rect x="455" y="210" width="280" height="130" rx="18" fill="#ffffff" stroke="#d9dee7" stroke-width="3"/>
    <text x="487" y="260" fill="#18202a" font-size="26" font-weight="700">Ingestion</text>
    <text x="487" y="298" fill="#344054" font-size="20">file selection</text>
    <text x="487" y="326" fill="#344054" font-size="20">idempotent runs</text>

    <rect x="830" y="210" width="280" height="130" rx="18" fill="#ecfdf3" stroke="#9ad4b5" stroke-width="3"/>
    <text x="862" y="260" fill="#18202a" font-size="26" font-weight="700">Extraction</text>
    <text x="862" y="298" fill="#344054" font-size="20">vision model</text>
    <text x="862" y="326" fill="#344054" font-size="20">strict JSON schema</text>

    <rect x="1205" y="210" width="280" height="130" rx="18" fill="#ffffff" stroke="#d9dee7" stroke-width="3"/>
    <text x="1237" y="260" fill="#18202a" font-size="26" font-weight="700">Normalize</text>
    <text x="1237" y="298" fill="#344054" font-size="20">dates, merchants,</text>
    <text x="1237" y="326" fill="#344054" font-size="20">amounts, accounts</text>

    <rect x="1205" y="455" width="280" height="130" rx="18" fill="#fffaeb" stroke="#f2c94c" stroke-width="3"/>
    <text x="1237" y="505" fill="#18202a" font-size="26" font-weight="700">Validate</text>
    <text x="1237" y="543" fill="#344054" font-size="20">uncertainty,</text>
    <text x="1237" y="571" fill="#344054" font-size="20">duplicates, gaps</text>

    <rect x="830" y="455" width="280" height="130" rx="18" fill="#ffffff" stroke="#d9dee7" stroke-width="3"/>
    <text x="862" y="505" fill="#18202a" font-size="26" font-weight="700">Categorize</text>
    <text x="862" y="543" fill="#344054" font-size="20">rules, AI fallback,</text>
    <text x="862" y="571" fill="#344054" font-size="20">merchant memory</text>

    <rect x="455" y="455" width="280" height="130" rx="18" fill="#fef3f2" stroke="#f6aaa5" stroke-width="3"/>
    <text x="487" y="505" fill="#18202a" font-size="26" font-weight="700">Human Review</text>
    <text x="487" y="543" fill="#344054" font-size="20">approve, correct,</text>
    <text x="487" y="571" fill="#344054" font-size="20">exclude, retry</text>

    <rect x="80" y="455" width="280" height="130" rx="18" fill="#eff6ff" stroke="#93b4f5" stroke-width="3"/>
    <text x="112" y="505" fill="#18202a" font-size="26" font-weight="700">Google Sheets</text>
    <text x="112" y="543" fill="#344054" font-size="20">durable memory</text>
    <text x="112" y="571" fill="#344054" font-size="20">and audit trail</text>

    <rect x="455" y="700" width="280" height="130" rx="18" fill="#ffffff" stroke="#d9dee7" stroke-width="3"/>
    <text x="487" y="750" fill="#18202a" font-size="26" font-weight="700">Summaries</text>
    <text x="487" y="788" fill="#344054" font-size="20">monthly, quarterly,</text>
    <text x="487" y="816" fill="#344054" font-size="20">cash flow, assets</text>

    <rect x="830" y="700" width="280" height="130" rx="18" fill="#ffffff" stroke="#d9dee7" stroke-width="3"/>
    <text x="862" y="750" fill="#18202a" font-size="26" font-weight="700">Anomalies</text>
    <text x="862" y="788" fill="#344054" font-size="20">duplicates, spikes,</text>
    <text x="862" y="816" fill="#344054" font-size="20">balance drops</text>

    <rect x="1205" y="700" width="280" height="130" rx="18" fill="#18202a" stroke="#18202a" stroke-width="3"/>
    <text x="1237" y="750" fill="#ffffff" font-size="26" font-weight="700">Dashboard</text>
    <text x="1237" y="788" fill="#d0d5dd" font-size="20">next-best actions</text>
    <text x="1237" y="816" fill="#d0d5dd" font-size="20">and source evidence</text>
  </g>

  <g fill="none" stroke="#475467" stroke-width="5" marker-end="url(#arrow)">
    <path d="M360 275H440"/>
    <path d="M735 275H815"/>
    <path d="M1110 275H1190"/>
    <path d="M1345 340V440"/>
    <path d="M1205 520H1125"/>
    <path d="M830 520H750"/>
    <path d="M455 520H375"/>
    <path d="M220 585V765H440"/>
    <path d="M735 765H815"/>
    <path d="M1110 765H1190"/>
    <path d="M1345 700V625H595V600"/>
  </g>

  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="80" y="925" width="1640" height="92" rx="18" fill="#ffffff" stroke="#d9dee7" stroke-width="3"/>
    <text x="115" y="965" fill="#18202a" font-size="25" font-weight="700">Safety and reproducibility</text>
    <text x="115" y="1001" fill="#344054" font-size="21">Single-user gate, private screenshot cache, redacted errors, setup health, privacy check, docs check, tests, type check, lint, and production build.</text>
  </g>
</svg>
